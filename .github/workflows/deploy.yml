name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Unit tests (Jest)
        run: npm test

      - name: E2E tests (Playwright)
        run: |
          python3 -m http.server 5173 --bind 127.0.0.1 --directory public &
          for i in $(seq 1 20); do curl -sf http://127.0.0.1:5173/ >/dev/null && break; sleep 0.5; done
          npx playwright test

  deploy:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.69.0"
          # Pass dir + project explicitly so it doesn't depend on config-file parsing.
          command: pages deploy public --project-name=infantino-flights
